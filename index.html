<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이지스퍼블리싱 도서 목록</title>
<meta property="og:title" content="이지스퍼블리싱 도서 목록">

<meta property="og:image" content="https://it-book-catalog.easyspub.co.kr/og-image.png">
<meta property="og:url" content="https://it-book-catalog.easyspub.co.kr/">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://it-book-catalog.easyspub.co.kr/og-image.png">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="styles/main.css?v=20260619j">
</head>
<body>
<header>
  <h1>이지스퍼블리싱 도서 목록</h1>
  <p>2026년 6월 기준 · 이지스퍼블리싱</p>
</header>

<!-- 이벤트 배너 -->
<button type="button" id="event-banner" hidden>
  <span class="eb-text">
    <strong id="eb-title"></strong>
    <span id="eb-sub"></span>
  </span>
  <span class="eb-cta">자세히 보기 →</span>
</button>

<!-- 시리즈 탭 -->
<div class="series-tabs" id="series-tabs">
  <button class="series-btn" data-series="doit">Do it!</button>
  <button class="series-btn" data-series="doenda">된다!</button>
  <button class="series-btn" data-series="standalone">단행본</button>
  <a class="series-btn" href="https://www.easyspub.co.kr/72_Menu/BoardWrite/PUB" target="_blank" style="text-decoration:none;display:inline-flex;align-items:center">교재 샘플/강의 자료 요청</a>
  <button class="series-btn series-btn-event" data-series="event">이벤트</button>
</div>

<!-- 필터 (동적 생성) -->
<div class="filters" id="filters"></div>

<div class="content">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="도서명 검색...">
  </div>

  <!-- 컨텐츠 (동적 렌더) -->
  <div id="series-content"></div>

  <div class="no-result" id="no-result">검색 결과가 없습니다.</div>
</div>

<!-- 서점 선택 모달 -->
<div id="modal-overlay">
  <div id="modal-box">
    <h3 id="modal-title"></h3>
    <p id="modal-desc"></p>
    <a id="btn-aladin" class="store-btn aladin" target="_blank" rel="noopener">📚 알라딘에서 보기</a>
    <a id="btn-yes24" class="store-btn yes24" target="_blank" rel="noopener">📖 예스24에서 보기</a>
    <a id="btn-kyobo" class="store-btn kyobo" target="_blank" rel="noopener">📗 교보문고에서 보기</a>
    <a id="btn-preview" class="store-btn preview" target="_blank" rel="noopener">📄 미리보기 PDF 보기</a>
    <button class="modal-close" id="modal-close">닫기</button>
  </div>
</div>

<!-- 교강사 카톡방 안내 팝업 -->
<div id="popup-overlay">
  <div id="popup-box">
    <button class="popup-x" id="popup-x" aria-label="닫기">&times;</button>
    <div class="popup-emoji" id="popup-emoji"></div>
    <h3 id="popup-title"></h3>
    <p id="popup-text"></p>
    <a id="popup-link" class="popup-join" target="_blank" rel="noopener"></a>
    <button class="popup-dismiss" id="popup-dismiss">오늘 하루 보지 않기</button>
  </div>
</div>

<script src="scripts/app.js?v=20260619j"></script>
</body>
</html>
