<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이지스퍼블리싱 도서 목록</title>
<meta property="og:title" content="이지스퍼블리싱 도서 목록">
<meta property="og:description" content="된다! · Do it! · 단행본 — 이지스퍼블리싱 전체 도서 목록">
<meta property="og:image" content="https://marketer-H.github.io/curriculum/og-image.png">
<meta property="og:url" content="https://marketer-H.github.io/curriculum/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://marketer-H.github.io/curriculum/og-image.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f5f6f8; color: #333; }

  header { background: #e8380d; color: white; padding: 28px 32px; }
  header h1 { font-size: 24px; font-weight: 800; }
  header p { font-size: 13px; opacity: .8; margin-top: 4px; }

  /* 시리즈 탭 */
  .series-tabs { background: #1c1c2e; display: flex;
                  border-bottom: 2px solid #e8380d; position: sticky; top: 0; z-index: 20; }
  .series-btn { padding: 14px 32px; border: none; background: transparent;
                 color: rgba(255,255,255,.55); font-size: 14px; font-weight: 700;
                 cursor: pointer; transition: all .2s; position: relative; letter-spacing: .3px; }
  .series-btn:hover { color: white; background: rgba(255,255,255,.06); }
  .series-btn.active { color: #ff6b47; background: rgba(232,56,13,.12); }
  .series-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0;
                               right: 0; height: 2px; background: #e8380d; }

  .filters { background: white; padding: 14px 32px; display: flex; gap: 8px;
              flex-wrap: wrap; border-bottom: 1px solid #eee;
              position: sticky; top: 50px; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid #ddd;
                 background: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .filter-btn:hover { border-color: #e8380d; color: #e8380d; }
  .filter-btn.active { background: #e8380d; color: white; border-color: #e8380d; }

  .content { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
  .search-wrap { margin-bottom: 20px; }
  .search-wrap input { width: 100%; max-width: 400px; padding: 10px 16px;
                         border: 1.5px solid #ddd; border-radius: 24px; font-size: 14px; }
  .search-wrap input:focus { outline: none; border-color: #e8380d; }

  /* 카테고리 섹션 (Do it!, 된다! 공통) */
  .section { margin-bottom: 44px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
                    padding-bottom: 12px; border-bottom: 2px solid #eee; }
  .section-header h2 { font-size: 18px; font-weight: 700; }
  .section-count { font-size: 12px; color: #bbb; font-weight: 500; background: #f5f6f8;
                   padding: 2px 8px; border-radius: 12px; }

  /* 도서 카드 */
  .card-grid { display: flex; flex-wrap: wrap; gap: 16px; }
  .card { display: flex; flex-direction: column; align-items: center; text-align: center;
          background: white; border-radius: 14px; padding: 16px 12px 14px;
          box-shadow: 0 2px 10px rgba(0,0,0,.08); cursor: pointer;
          transition: all .22s; width: 148px; flex-shrink: 0; }
  .card:hover { transform: translateY(-6px); box-shadow: 0 14px 36px rgba(0,0,0,.16); }
  .card:hover .card-title { color: #333; }
  .card img { width: 96px; height: 136px; object-fit: cover; border-radius: 7px;
              box-shadow: 0 4px 16px rgba(0,0,0,.22); margin-bottom: 10px; flex-shrink: 0; }
  .card-title { font-size: 11px; line-height: 1.5; color: #444; word-break: keep-all; min-height: 66px; }

  .no-result { text-align: center; color: #aaa; padding: 60px 0; font-size: 15px; display: none; }

  /* 모달 */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
                    z-index: 100; align-items: center; justify-content: center; }
  #modal-overlay.open { display: flex; }
  #modal-box { background: white; border-radius: 16px; padding: 28px 32px; min-width: 300px;
                max-width: 420px; width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,.2); }
  #modal-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 20px; line-height: 1.5; }
  .store-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 16px;
                border-radius: 10px; border: 1.5px solid #eee; background: white;
                font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 10px;
                text-decoration: none; color: #333; transition: all .15s; }
  .store-btn:hover { border-color: currentColor; }
  .store-btn.aladin { color: #2980b9; } .store-btn.aladin:hover { background: #e8f4fd; }
  .store-btn.yes24  { color: #c0392b; } .store-btn.yes24:hover  { background: #fdf0ef; }
  .store-btn.kyobo  { color: #27ae60; } .store-btn.kyobo:hover  { background: #eafaf1; }
  .store-btn.disabled { color: #bbb; border-color: #f0f0f0; cursor: default; pointer-events: none; }
  .modal-close { width: 100%; padding: 10px; border: none; background: #f5f6f8;
                  border-radius: 8px; font-size: 13px; cursor: pointer; margin-top: 4px; }
  .modal-close:hover { background: #eee; }
</style>
</head>
<body>
<header>
  <h1>이지스퍼블리싱 도서 목록</h1>
  <p>2026년 6월 기준 · 이지스퍼블리싱</p>
</header>

<!-- 시리즈 탭 -->
<div class="series-tabs" id="series-tabs">
  <button class="series-btn" data-series="doit">Do it!</button>
  <button class="series-btn" data-series="doenda">된다!</button>
  <button class="series-btn" data-series="standalone">단행본</button>
  <a class="series-btn" href="https://www.easyspub.co.kr/72_Menu/BoardWrite/PUB" target="_blank" style="text-decoration:none;display:inline-flex;align-items:center">교재 샘플/강의 자료 요청</a>
</div>

<!-- 필터 (동적 생성) -->
<div class="filters" id="filters"></div>

<div class="content">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="도서명 검색...">
  </div>

  <!-- 컨텐츠 (동적 렌더) -->
  <div id="series-content"></div>

  <div class="no-result" id="no-result">검색 결과가 없습니다.</div>
</div>

<!-- 서점 선택 모달 -->
<div id="modal-overlay">
  <div id="modal-box">
    <h3 id="modal-title"></h3>
    <a id="btn-aladin" class="store-btn aladin" target="_blank" rel="noopener">📚 알라딘에서 보기</a>
    <a id="btn-yes24" class="store-btn yes24" target="_blank" rel="noopener">📖 예스24에서 보기</a>
    <a id="btn-kyobo" class="store-btn kyobo" target="_blank" rel="noopener">📗 교보문고에서 보기</a>
    <button class="modal-close" id="modal-close">닫기</button>
  </div>
</div>

<script>
(async () => {
  const [books, catalog] = await Promise.all([
    fetch('data/books.json').then(r => r.json()),
    fetch('data/catalog.json').then(r => r.json())
  ]);

  const state = {
    series: 'doit',
    filters: { doit: 'all', doenda: 'all' },
    query: ''
  };

  const $tabs    = document.getElementById('series-tabs');
  const $filters = document.getElementById('filters');
  const $content = document.getElementById('series-content');
  const $search  = document.getElementById('search');
  const $noResult = document.getElementById('no-result');
  const $overlay = document.getElementById('modal-overlay');

  // ===== 카드 생성 =====
  function createCard(bookId) {
    const book = books[bookId];
    if (!book) return null;
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.bookId = bookId;
    card.dataset.title = book.title.toLowerCase();

    const img = document.createElement('img');
    img.src = book.cover;
    img.alt = book.title;
    img.loading = 'lazy';

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = book.title;

    card.append(img, title);
    card.addEventListener('click', () => openModal(book));
    return card;
  }

  // ===== 카테고리 섹션 생성 =====
  function createCategorySection(cat) {
    const section = document.createElement('div');
    section.className = 'section';
    section.dataset.categoryId = cat.id;

    const header = document.createElement('div');
    header.className = 'section-header';
    const h2 = document.createElement('h2');
    h2.textContent = `${cat.icon} ${cat.name}`;
    const count = document.createElement('span');
    count.className = 'section-count';
    count.textContent = `${cat.books.length}권`;
    header.append(h2, count);

    const grid = document.createElement('div');
    grid.className = 'card-grid';
    cat.books.forEach(id => {
      const card = createCard(id);
      if (card) grid.appendChild(card);
    });

    section.append(header, grid);
    return section;
  }

  // ===== 필터 렌더 =====
  function renderFilters() {
    $filters.innerHTML = '';
    if (state.series === 'standalone') {
      $filters.style.display = 'none';
      return;
    }
    $filters.style.display = '';
    const cats = catalog[state.series];
    const activeFilter = state.filters[state.series];

    const allBtn = document.createElement('button');
    allBtn.className = 'filter-btn' + (activeFilter === 'all' ? ' active' : '');
    allBtn.textContent = '전체';
    allBtn.addEventListener('click', () => setFilter('all'));
    $filters.appendChild(allBtn);

    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (activeFilter === cat.id ? ' active' : '');
      btn.textContent = cat.name;
      btn.addEventListener('click', () => setFilter(cat.id));
      $filters.appendChild(btn);
    });
  }

  // ===== 컨텐츠 렌더 =====
  function renderContent() {
    $content.innerHTML = '';
    if (state.series === 'standalone') {
      // 단행본은 카테고리 없는 단일 그리드 (가짜 섹션으로 헤더 통일)
      const section = createCategorySection({
        id: '_standalone',
        icon: '📚',
        name: '단행본',
        books: catalog.standalone
      });
      $content.appendChild(section);
      return;
    }
    const cats = catalog[state.series];
    cats.forEach(cat => $content.appendChild(createCategorySection(cat)));
  }

  // ===== 시리즈 탭 =====
  function setSeries(series) {
    state.series = series;
    state.query = '';
    $search.value = '';
    [...$tabs.querySelectorAll('.series-btn')].forEach(btn => {
      btn.classList.toggle('active', btn.dataset.series === series);
    });
    renderFilters();
    renderContent();
    applySearchAndFilter();
  }

  // ===== 필터 =====
  function setFilter(categoryId) {
    state.filters[state.series] = categoryId;
    renderFilters();
    applySearchAndFilter();
  }

  // ===== 검색 + 필터 적용 =====
  function applySearchAndFilter() {
    const q = state.query.toLowerCase();
    const activeFilter = state.series === 'standalone' ? 'all' : state.filters[state.series];
    let anyVisible = false;

    [...$content.querySelectorAll('.section')].forEach(section => {
      const catId = section.dataset.categoryId;
      const catMatch = activeFilter === 'all' || catId === activeFilter;
      if (!catMatch) { section.style.display = 'none'; return; }

      if (!q) {
        section.style.display = '';
        section.querySelectorAll('.card').forEach(c => c.style.display = '');
        anyVisible = true;
        return;
      }

      let sectionHasMatch = false;
      section.querySelectorAll('.card').forEach(card => {
        const match = card.dataset.title.includes(q);
        card.style.display = match ? '' : 'none';
        if (match) sectionHasMatch = true;
      });
      section.style.display = sectionHasMatch ? '' : 'none';
      if (sectionHasMatch) anyVisible = true;
    });

    $noResult.style.display = anyVisible ? 'none' : '';
  }

  // ===== 모달 =====
  function openModal(book) {
    document.getElementById('modal-title').textContent = book.title;
    const setBtn = (id, url) => {
      const btn = document.getElementById(id);
      if (url) { btn.href = url; btn.classList.remove('disabled'); btn.style.pointerEvents = ''; }
      else     { btn.removeAttribute('href'); btn.classList.add('disabled'); btn.style.pointerEvents = 'none'; }
    };
    setBtn('btn-aladin', book.links.aladin);
    setBtn('btn-yes24',  book.links.yes24);
    setBtn('btn-kyobo',  book.links.kyobo);
    $overlay.classList.add('open');
  }
  function closeModal() { $overlay.classList.remove('open'); }
  $overlay.addEventListener('click', e => { if (e.target === $overlay) closeModal(); });
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ===== 이벤트 바인딩 =====
  $tabs.addEventListener('click', e => {
    const btn = e.target.closest('.series-btn[data-series]');
    if (btn) setSeries(btn.dataset.series);
  });
  $search.addEventListener('input', e => {
    state.query = e.target.value;
    applySearchAndFilter();
  });

  // ===== 초기 렌더 =====
  setSeries('doit');
})();
</script>
</body>
</html>
